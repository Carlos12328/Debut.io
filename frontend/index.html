<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debut.io — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card card p-4">
      <div class="login-logo">Debut<span>.io</span></div>
      <p class="login-subtitle">Sistema de Gestão para Festas de 15 Anos</p>

      <div id="login-section">
        <form id="login-form">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" id="login-email" class="form-control" placeholder="seu@email.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Senha</label>
            <input type="password" id="login-password" class="form-control" placeholder="Sua senha" required />
          </div>
          <div id="login-error" class="alert alert-danger d-none"></div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
          </button>
        </form>
        <hr />
        <p class="text-center mb-0 small">Não tem conta? <a href="#" id="show-register">Cadastre-se</a></p>
      </div>

      <div id="register-section" class="d-none">
        <form id="register-form">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nome</label>
            <input type="text" id="reg-name" class="form-control" placeholder="Seu nome completo" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" id="reg-email" class="form-control" placeholder="seu@email.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Senha</label>
            <input type="password" id="reg-password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6" />
          </div>
          <div id="register-error" class="alert alert-danger d-none"></div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="bi bi-person-plus me-2"></i>Cadastrar
          </button>
        </form>
        <hr />
        <p class="text-center mb-0 small">Já tem conta? <a href="#" id="show-login">Entrar</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
