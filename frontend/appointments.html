<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debut.io — Compromissos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/dashboard.html">Debut<span>.io</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/events.html"><i class="bi bi-calendar-heart me-1"></i>Eventos</a></li>
          <li class="nav-item"><a class="nav-link" href="/vendors.html"><i class="bi bi-shop me-1"></i>Fornecedores</a></li>
          <li class="nav-item"><a class="nav-link" href="/payments.html"><i class="bi bi-cash-stack me-1"></i>Pagamentos</a></li>
          <li class="nav-item"><a class="nav-link" href="/tasks.html"><i class="bi bi-check2-square me-1"></i>Tarefas</a></li>
          <li class="nav-item"><a class="nav-link active" href="/appointments.html"><i class="bi bi-calendar-check me-1"></i>Compromissos</a></li>
          <li class="nav-item"><a class="nav-link" href="/share.html"><i class="bi bi-share me-1"></i>Compartilhar</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <span class="current-event-badge"><i class="bi bi-star-fill me-1"></i>Evento: <strong id="current-event-name">Nenhum</strong></span>
          <button class="btn btn-sm btn-outline-light" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <div id="toast-container"></div>

  <div class="container-fluid py-4 px-4">
    <div class="page-header">
      <h2><i class="bi bi-calendar-check me-2"></i>Compromissos</h2>
      <button class="btn btn-light fw-bold" data-bs-toggle="modal" data-bs-target="#appointmentModal" onclick="openCreateModal()">
        <i class="bi bi-plus-circle me-2"></i>Novo Compromisso
      </button>
    </div>

    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr><th>Título</th><th>Data</th><th>Hora</th><th>Local</th><th>Descrição</th><th>Ações</th></tr>
            </thead>
            <tbody id="appointments-table">
              <tr><td colspan="6" class="text-center text-muted py-4">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="appointmentModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header" style="background:linear-gradient(135deg,#8B2FC9,#C47FE8);color:#fff;">
          <h5 class="modal-title" id="appointmentModalTitle">Novo Compromisso</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="appointment-form">
            <input type="hidden" id="appointment-id" />
            <div class="mb-3">
              <label class="form-label fw-semibold">Título *</label>
              <input type="text" id="appointment-title" class="form-control" placeholder="Ex: Visita ao buffet" required />
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold">Data *</label>
                <input type="date" id="appointment-date" class="form-control" required />
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Hora</label>
                <input type="time" id="appointment-time" class="form-control" />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Local</label>
              <input type="text" id="appointment-location" class="form-control" placeholder="Ex: Rua das Flores, 123" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Descrição</label>
              <textarea id="appointment-description" class="form-control" rows="3" placeholder="Detalhes do compromisso..."></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="saveAppointment()"><i class="bi bi-save me-2"></i>Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/appointments.js"></script>
</body>
</html>
