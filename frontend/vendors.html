<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debut.io — Fornecedores</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/dashboard.html">Debut<span>.io</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/events.html"><i class="bi bi-calendar-heart me-1"></i>Eventos</a></li>
          <li class="nav-item"><a class="nav-link active" href="/vendors.html"><i class="bi bi-shop me-1"></i>Fornecedores</a></li>
          <li class="nav-item"><a class="nav-link" href="/payments.html"><i class="bi bi-cash-stack me-1"></i>Pagamentos</a></li>
          <li class="nav-item"><a class="nav-link" href="/tasks.html"><i class="bi bi-check2-square me-1"></i>Tarefas</a></li>
          <li class="nav-item"><a class="nav-link" href="/appointments.html"><i class="bi bi-calendar-check me-1"></i>Compromissos</a></li>
          <li class="nav-item"><a class="nav-link" href="/share.html"><i class="bi bi-share me-1"></i>Compartilhar</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <span class="current-event-badge"><i class="bi bi-star-fill me-1"></i>Evento: <strong id="current-event-name">Nenhum</strong></span>
          <button class="btn btn-sm btn-outline-light" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <div id="toast-container"></div>

  <div class="container-fluid py-4 px-4">
    <div class="page-header">
      <h2><i class="bi bi-shop me-2"></i>Fornecedores</h2>
      <button class="btn btn-light fw-bold" data-bs-toggle="modal" data-bs-target="#vendorModal" onclick="openCreateModal()">
        <i class="bi bi-plus-circle me-2"></i>Novo Fornecedor
      </button>
    </div>

    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr><th>Nome</th><th>Categoria</th><th>Telefone</th><th>Email</th><th>Observações</th><th>Ações</th></tr>
            </thead>
            <tbody id="vendors-table">
              <tr><td colspan="6" class="text-center text-muted py-4">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="vendorModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header" style="background:linear-gradient(135deg,#8B2FC9,#C47FE8);color:#fff;">
          <h5 class="modal-title" id="vendorModalTitle">Novo Fornecedor</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="vendor-form">
            <input type="hidden" id="vendor-id" />
            <div class="mb-3">
              <label class="form-label fw-semibold">Nome *</label>
              <input type="text" id="vendor-name" class="form-control" placeholder="Ex: Buffet Sabor & Arte" required />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Categoria *</label>
              <select id="vendor-category" class="form-select" required>
                <option value="">Selecione...</option>
                <option>Buffet</option>
                <option>Decoração</option>
                <option>Fotografia</option>
                <option>Filmagem</option>
                <option>DJ / Música</option>
                <option>Bolo / Doces</option>
                <option>Convites</option>
                <option>Vestido</option>
                <option>Salão de Beleza</option>
                <option>Local / Espaço</option>
                <option>Iluminação</option>
                <option>Animação</option>
                <option>Outro</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Telefone</label>
              <input type="tel" id="vendor-phone" class="form-control" placeholder="(00) 00000-0000" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" id="vendor-email" class="form-control" placeholder="contato@fornecedor.com" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Observações</label>
              <textarea id="vendor-notes" class="form-control" rows="3" placeholder="Informações adicionais..."></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="saveVendor()"><i class="bi bi-save me-2"></i>Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/vendors.js"></script>
</body>
</html>
